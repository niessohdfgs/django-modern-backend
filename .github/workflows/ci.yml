name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: blog_db
          POSTGRES_USER: blog_user
          POSTGRES_PASSWORD: blog_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blog_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DB_NAME: blog_db
      DB_USER: blog_user
      DB_PASSWORD: blog_pass
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

      # 🔥 FIX IMPORTANT (Django crash fix)
      SECRET_KEY: django-insecure-test-key
      DEBUG: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          sudo apt-get install -y postgresql-client
          until pg_isready -h 127.0.0.1 -p 5432 -U blog_user; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run migrations
        working-directory: core
        run: |
          python manage.py migrate

      - name: Run tests
        working-directory: core
        run: |
          python manage.py test